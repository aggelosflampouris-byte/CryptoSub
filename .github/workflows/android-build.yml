name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Generate Gradle Wrapper (Version 8.4)
      run: cd android && gradle wrapper --gradle-version 8.4

    - name: Build Debug APK
      run: cd android && ./gradlew assembleDebug

    - name: Upload APK as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PrivateMessenger-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Create or Update GitHub Release
      uses: ncipollo/release-action@v1
      with:
        artifacts: "android/app/build/outputs/apk/debug/app-debug.apk"
        tag: "latest"
        name: "Latest Auto-Build"
        allowUpdates: true
        replacesArtifacts: true
        makeLatest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
