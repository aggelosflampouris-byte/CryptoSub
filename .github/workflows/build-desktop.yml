name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags e.g. v0.1.0
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'CryptoSub ${{ github.ref_name }}'
          releaseBody: |
            ## CryptoSub Desktop ${{ github.ref_name }}
            
            ### Downloads
            - **Windows**: Download the `.exe` or `.msi` installer.
            - **macOS (Apple Silicon)**: Download the `.dmg` (aarch64).
            - **macOS (Intel)**: Download the `.dmg` (x86_64).
            - **Linux**: Download the `.AppImage` or `.deb`.

            ### What's New
            See the commit history for details.
          releaseDraft: false
          prerelease: false
