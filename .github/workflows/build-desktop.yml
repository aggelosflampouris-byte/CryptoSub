name: Build & Publish Desktop App (Windows)

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Installer

    steps:
      # ── 1. Source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Rust ────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      # ── 4. Frontend ────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: desktop
        run: npm install

      # ── 5. Generate properly-formatted icons ───────────────────────
      # Download a valid 512×512 PNG source (Tauri's own default app icon)
      # then let `tauri icon` convert it into the correct ICO / ICNS / PNG sizes.
      - name: Generate Tauri icons from a valid PNG source
        working-directory: desktop
        run: |
          curl -L -o app-icon.png "https://github.com/tauri-apps/tauri/raw/dev/crates/tauri-build/test/icon.png" || \
          curl -L -o app-icon.png "https://raw.githubusercontent.com/tauri-apps/create-tauri-app/main/templates/template-svelte-ts/src-tauri/icons/icon.png" || \
          curl -L -o app-icon.png "https://raw.githubusercontent.com/tauri-apps/tauri/2-stable/examples/api/src-tauri/icons/icon.png"
          npx @tauri-apps/cli icon app-icon.png

      # ── 6. Tauri Build + Rolling Release ───────────────────────────
      - name: Build Tauri Windows installer & publish to rolling "latest" release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          # Always publish to the same "latest" tag (overwritten on each push)
          tagName: latest
          releaseName: 'CryptoSub — Latest Build'
          releaseBody: |
            ## 📥 CryptoSub — Latest Desktop Build (Windows)

            This release is **automatically updated** on every push to `main`.
            Always download from here for the most recent version.

            ---

            ### 🪟 Windows Installation
            1. Download **`CryptoSub_x.x.x_x64-setup.exe`** below.
            2. Run the installer — it will install CryptoSub and create a Start Menu shortcut.
            3. On first launch, Windows SmartScreen may warn about an unknown publisher.
               Click **"More info → Run anyway"** to proceed.

            ---
            > macOS and Linux builds coming soon.
          releaseDraft: false
          prerelease: false
