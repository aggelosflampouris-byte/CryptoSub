name: Build & Publish Desktop App (Windows)

on:
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Windows Installer

    steps:
      # ── 1. Source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Rust ────────────────────────────────────────────────────
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      # ── 4. Frontend ────────────────────────────────────────────────
      - name: Install npm dependencies
        working-directory: desktop
        run: npm install

      # ── 5. Generate properly-formatted icons ───────────────────────
      # The Windows Resource Compiler (RC.EXE) requires ICO files in v3.00 format.
      # Tauri CLI's `icon` command correctly converts a source PNG into all
      # required formats: .ico (Windows), .icns (macOS), and sized PNGs.
      - name: Generate Tauri icons from source PNG
        working-directory: desktop
        run: npx @tauri-apps/cli icon src-tauri/icons/128x128.png

      # ── 6. Tauri Build + Rolling Release ───────────────────────────
      - name: Build Tauri Windows installer & publish to rolling "latest" release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          # Always publish to the same "latest" tag (overwritten on each push)
          tagName: latest
          releaseName: 'CryptoSub — Latest Build'
          releaseBody: |
            ## 📥 CryptoSub — Latest Desktop Build (Windows)

            This release is **automatically updated** on every push to `main`.
            Always download from here for the most recent version.

            ---

            ### 🪟 Windows Installation
            1. Download **`CryptoSub_x.x.x_x64-setup.exe`** below.
            2. Run the installer — it will install CryptoSub and create a Start Menu shortcut.
            3. On first launch, Windows SmartScreen may warn about an unknown publisher.
               Click **"More info → Run anyway"** to proceed.

            ---
            > macOS and Linux builds coming soon.
          releaseDraft: false
          prerelease: false
